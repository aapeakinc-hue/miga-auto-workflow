<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Pacifico&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&amp;display=swap');
      .logo-text {
        font-family: 'Pacifico', cursive;
        font-size: 60px;
        fill: #FF6B9D;
      }
      .tagline {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 18px;
        fill: #FFFFFF;
        letter-spacing: 8px;
        text-transform: uppercase;
      }
    </style>
  </defs>

  <!-- 树袋熊（考拉）图像 -->
  <g transform="translate(30, 15)">
    <!-- 身体 -->
    <ellipse cx="75" cy="75" rx="60" ry="67.5" fill="#FF6B9D"/>

    <!-- 头部 -->
    <circle cx="75" cy="52.5" r="48" fill="#FF6B9D"/>

    <!-- 耳朵 -->
    <ellipse cx="33" cy="37.5" rx="22.5" ry="27" fill="#FF6B9D"/>
    <ellipse cx="117" cy="37.5" rx="22.5" ry="27" fill="#FF6B9D"/>
    <!-- 耳朵内侧 -->
    <ellipse cx="33" cy="37.5" rx="15" ry="18" fill="#FFB6C1"/>
    <ellipse cx="117" cy="37.5" rx="15" ry="18" fill="#FFB6C1"/>

    <!-- 鼻子 -->
    <ellipse cx="75" cy="57" rx="21" ry="18" fill="#8B4513"/>
    <ellipse cx="75" cy="55.5" rx="12" ry="9" fill="#A0522D"/>

    <!-- 眼睛 -->
    <ellipse cx="57" cy="42" rx="12" ry="13.5" fill="#4A4A4A"/>
    <ellipse cx="93" cy="42" rx="12" ry="13.5" fill="#4A4A4A"/>
    <!-- 眼睛高光 -->
    <circle cx="60" cy="39" r="4.5" fill="white"/>
    <circle cx="96" cy="39" r="4.5" fill="white"/>

    <!-- 腹部 -->
    <ellipse cx="75" cy="87" rx="37.5" ry="33" fill="#FFB6C1"/>

    <!-- 手臂（举起） -->
    <ellipse cx="120" cy="72" rx="18" ry="27" fill="#FF6B9D" transform="rotate(-30, 120, 72)"/>
  </g>

  <!-- 手写文字 -->
  <text x="195" y="97.5" class="logo-text">migac</text>

  <!-- 副标题 -->
  <text x="195" y="135" class="tagline">Crystal Crafts</text>

  <!-- 右侧装饰 - 简化的水晶元素 -->
  <g transform="translate(510, 37.5)">
    <polygon points="30,0 60,22.5 60,52.5 30,75 0,52.5 0,22.5" fill="#FFD700" opacity="0.8"/>
    <polygon points="30,12 48,27 48,48 30,63 12,48 12,27" fill="#FFA500" opacity="0.6"/>
  </g>
</svg>
