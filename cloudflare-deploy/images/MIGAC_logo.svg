<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Pacifico&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;display=swap');
      .logo-text {
        font-family: 'Pacifico', cursive;
        font-size: 48px;
        fill: #E88A9D;
      }
    </style>
  </defs>

  <!-- 树袋熊（考拉）图像 - 坐姿 -->
  <g transform="translate(150, 10)">
    <!-- 后腿 -->
    <ellipse cx="50" cy="95" rx="35" ry="20" fill="#E88A9D"/>
    <ellipse cx="50" cy="95" rx="25" ry="14" fill="#FFE4D6"/>
    
    <!-- 身体 -->
    <ellipse cx="50" cy="75" rx="42" ry="38" fill="#FFB6C3"/>
    <ellipse cx="50" cy="78" rx="30" ry="26" fill="#FFE4D6"/>
    
    <!-- 头部 -->
    <circle cx="50" cy="40" r="35" fill="#FFB6C3"/>
    
    <!-- 耳朵 -->
    <ellipse cx="18" cy="20" rx="16" ry="19" fill="#FFB6C3"/>
    <ellipse cx="82" cy="20" rx="16" ry="19" fill="#FFB6C3"/>
    <!-- 耳朵内侧 -->
    <ellipse cx="18" cy="20" rx="11" ry="13" fill="#FFE4D6"/>
    <ellipse cx="82" cy="20" rx="11" ry="13" fill="#FFE4D6"/>
    
    <!-- 鼻子 -->
    <ellipse cx="50" cy="48" rx="13" ry="11" fill="#8B6B5C"/>
    <ellipse cx="50" cy="46" rx="7" ry="5" fill="#A07A68"/>
    
    <!-- 眼睛 -->
    <circle cx="38" cy="35" r="7" fill="#5C4033"/>
    <circle cx="62" cy="35" r="7" fill="#5C4033"/>
    
    <!-- 嘴巴 -->
    <path d="M 45 58 Q 50 62 55 58" stroke="#5C4033" stroke-width="2" fill="none"/>
    
    <!-- 前爪1 - 搭在肚子上 -->
    <ellipse cx="25" cy="75" rx="12" ry="14" fill="#FFB6C3"/>
    <ellipse cx="25" cy="75" rx="8" ry="10" fill="#FFE4D6"/>
    
    <!-- 前爪2 - 在身侧 -->
    <ellipse cx="75" cy="75" rx="12" ry="14" fill="#FFB6C3"/>
    <ellipse cx="75" cy="75" rx="8" ry="10" fill="#FFE4D6"/>
  </g>

  <!-- 手写文字 migac -->
  <text x="200" y="165" text-anchor="middle" class="logo-text">migac</text>
</svg>
