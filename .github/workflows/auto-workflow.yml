name: 外贸客户开发自动化

# 定时任务：每天北京时间上午 9 点运行
# Cron 表达式：UTC 时间 1:00 = 北京时间 9:00
on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 1:00（北京时间 9:00）- 运行工作流

    - cron: '0 3 * * *'  # 每天 UTC 3:00（北京时间 11:00）- 自动化运维

  # 允许手动触发（用于测试）
  workflow_dispatch:

env:
  NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}

jobs:
  # 主工作流：自动搜索客户和发送邮件
  run-auto-workflow:
    runs-on: ubuntu-latest

    steps:
      # 步骤1：检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2：设置 Python 环境
      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 步骤3：安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 步骤4：运行自动化工作流
      - name: 运行自动化工作流
        env:
          SNOVIO_API_KEY: ${{ secrets.SNOVIO_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          cd src
          python simple_auto_workflow.py

      # 步骤5：上传日志
      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      # 步骤6：生成报告摘要
      - name: 生成报告摘要
        if: always()
        run: |
          echo "## 📊 工作流执行结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ 执行时间: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 查看详细日志请下载附件" >> $GITHUB_STEP_SUMMARY

      # 步骤7：发送成功通知
      - name: 发送成功通知
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          python src/send_notification.py success "外贸客户开发工作流" "工作流成功完成"

      # 步骤8：发送失败通知
      - name: 发送失败通知
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          python src/send_notification.py failure "外贸客户开发工作流" "工作流执行失败，请查看日志"

  # 自动化运维任务：监控、优化、分析
  auto-ops:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *'

    steps:
      # 步骤1：检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2：设置 Python 环境
      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 步骤3：安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 步骤4：运行智能自动化运维
      - name: 运行智能自动化运维
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src
          python intelligent_auto_ops.py

      # 步骤5：上传运维报告
      - name: 上传运维报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-report-${{ github.run_number }}
          path: logs/ops_*.json
          retention-days: 30

      # 步骤6：上传分析报告
      - name: 上传分析报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report-${{ github.run_number }}
          path: logs/analysis_*.json
          retention-days: 30

      # 步骤7：生成运维摘要
      - name: 生成运维摘要
        if: always()
        run: |
          echo "## 🤖 自动化运维报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ 运维时间: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 查看详细报告请下载附件" >> $GITHUB_STEP_SUMMARY

      # 步骤8：发送运维成功通知
      - name: 发送运维成功通知
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          python src/send_notification.py success "智能自动化运维" "自动化运维成功完成"

      # 步骤9：发送运维失败通知
      - name: 发送运维失败通知
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          python src/send_notification.py failure "智能自动化运维" "自动化运维执行失败，请查看日志"
