name: 外贸客户开发自动化

# 定时任务：每天北京时间上午 9 点运行
# Cron 表达式：UTC 时间 1:00 = 北京时间 9:00
on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 1:00（北京时间 9:00）

  # 允许手动触发（用于测试）
  workflow_dispatch:

jobs:
  run-auto-workflow:
    runs-on: ubuntu-latest

    steps:
      # 步骤1：检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2：设置 Python 环境
      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 步骤3：安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install langgraph langchain langchain-core langchain-openai
          pip install requests beautifulsoup4

      # 步骤4：运行自动化工作流
      - name: 运行自动化工作流
        env:
          COZE_WORKSPACE_PATH: ${{ github.workspace }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}  # 如果需要
          SNOVIO_API_KEY: ${{ secrets.SNOVIO_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          cd src
          python auto_workflow.py

      # 步骤5：上传日志（可选）
      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs
          path: logs/
          retention-days: 30

      # 步骤6：生成报告摘要
      - name: 生成报告摘要
        if: always()
        run: |
          echo "## 📊 工作流执行结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ 执行时间: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 查看详细日志请下载附件" >> $GITHUB_STEP_SUMMARY
