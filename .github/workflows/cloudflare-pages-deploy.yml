name: Cloudflare Pages 部署

# 触发条件：当 cloudflare-deploy 目录有代码推送时自动部署
on:
  push:
    branches:
      - main
    paths:
      - 'cloudflare-deploy/**'

  # 允许手动触发
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 步骤 1：检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2：部署到 Cloudflare Pages
      - name: 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy cloudflare-deploy --project-name=miga-website

      # 步骤 3：输出部署信息
      - name: 输出部署信息
        run: |
          echo "## 🚀 部署成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 代码已部署到 Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 访问网站: https://www.miga.cc" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ 部署时间: $(date -u)" >> $GITHUB_STEP_SUMMARY

      # 步骤 4：发送部署成功通知（可选）
      - name: 发送部署通知
        if: success()
        run: |
          echo "Cloudflare Pages 部署成功！"
