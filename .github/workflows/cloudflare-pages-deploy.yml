name:
 Cloudflare Pages 部署

on:
  push:
    branches:
      -
 main
    paths:
      - 'cloudflare-deploy/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-
latest

    steps:
      - name:
 检出代码
        uses:
 actions/checkout@v4

      - name:
 安装 Node.js
        uses: actions/setup-
node@v4
        with:
          node-version: '20'

      - name:
 安装 Wrangler CLI
        run: |
          npm install -g wrangler

      - name:
 部署到 Cloudflare Pages
        run: |
          cd cloudflare-deploy
          wrangler pages deploy . --project-name=miga-website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name:
 输出部署信息
        if:
 success()
        run: |
          echo "## 🚀 部署成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 代码已部署到 Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 访问网站: https://www.miga.cc" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ 部署时间: $(date -u)" >> $GITHUB_STEP_SUMMARY
