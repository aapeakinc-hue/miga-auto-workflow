name: 外贸客户开发主工作流

# 定时任务：每天北京时间上午 9 点运行
# Cron 表达式：UTC 时间 1:00 = 北京时间 9:00
on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 1:00（北京时间 9:00）- 运行工作流

  # 允许手动触发（用于测试）
  workflow_dispatch:

jobs:
  # 主工作流：自动搜索客户和发送邮件
  run-auto-workflow:
    runs-on: ubuntu-latest

    steps:
      # 步骤1：检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2：设置 Python 环境
      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 步骤3：清除缓存并安装依赖
      - name: 清除 pip 缓存
        run: |
          pip cache purge || true
          rm -rf ~/.cache/pip || true

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip --no-cache-dir
          pip install -r requirements.txt --no-cache-dir

      # 步骤4：运行自动化工作流（使用真实 API）
      - name: 运行自动化工作流
        env:
          SNOVIO_API_TOKEN: ${{ secrets.SNOVIO_API_TOKEN }}
          SNOVIO_CLIENT_ID: ${{ secrets.SNOVIO_CLIENT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          cd src
          python auto_workflow_with_real_api.py --keywords "美国水晶工艺品批发商" --website "https://www.aapeakinc.com"

      # 步骤5：上传日志
      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      # 步骤6：生成报告摘要
      - name: 生成报告摘要
        if: always()
        run: |
          echo "## 📊 工作流执行结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ 执行时间: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 查看详细日志请下载附件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📧 通知功能已移除，请查看 workflow 日志" >> $GITHUB_STEP_SUMMARY
