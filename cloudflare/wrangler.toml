# Cloudflare Worker 配置

name = "miga-auto-workflow"
main = "worker.js"
compatibility_date = "2024-01-01"

# Cron Triggers（定时触发器）

# 每天上午 9 点 UTC（北京时间下午 5 点）
[triggers]
crons = ["0 9 * * *"]

# 或者每天两次（上午9点和下午3点 UTC）
# [triggers]
# crons = ["0 9,15 * * *"]

# 或者每 6 小时一次
# [triggers]
# crons = ["0 */6 * * *"]

# 环境变量（可选）
# [vars]
# API_ENDPOINT = "https://your-api.com/workflow"
# API_KEY = "your-api-key"
